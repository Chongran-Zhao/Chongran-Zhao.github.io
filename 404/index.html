<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title>Website Offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
      }

      main {
        width: min(92vw, 640px);
        padding: 32px;
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 650;
        letter-spacing: 0;
      }

      p {
        margin: 0 auto;
        max-width: 38rem;
        color: #4b5563;
        font-size: 1rem;
        line-height: 1.7;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #0f172a;
          color: #f8fafc;
        }

        p {
          color: #cbd5e1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Website Offline</h1>
      <p>This personal website is currently not displayed. The repository remains active for source updates.</p>
    </main>
  </body>
</html>
